[logging]
path = "logconfig.ini"
level = "INFO"

[topology]
path = "graphml/SixNode.graphml"

[topology.resource]
wavelengths = 2
max_bandwidth = 100
max_key_rate = 10

[traffic]
calls = 10
load = 2.0
mean_holding_time = 10.0
seed = 42
max_bandwidth = 100
min_bandwidth = 1
max_key_rate = 4
min_key_rate = 1
max_security_level = 2
min_security_level = 0

[[traffic.call_types]]
rate = 10
weight = 7
cos = 1

[[traffic.call_types]]
rate = 40
weight = 2
cos = 1

[[traffic.call_types]]
rate = 100
weight = 1
cos = 1

[algorithm]
name = "JKPG"
k = 4

[costs]
wavelength_cost = 2.0
distance_cost = 0.03
key_rate_cost = 1.2
security_port_cost = 3.0
logical_hop_tiebreak = 0.001
physical_hop_tiebreak = 0.001

[outputs]
directory = "outputs"
solution_filename = "solution.json"
report_filename = "solution_report.md"
enable_visualization = true
