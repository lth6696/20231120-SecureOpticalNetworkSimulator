[logging]
level = "INFO"
file = "Log"
filemode = "w"
format = "%(asctime)s - %(levelname)s - %(message)s"
encoding = "utf-8"
console = false

[topology]
path = "graphml/SixNode.graphml"

[topology.resource]
wavelengths = 8
max_bandwidth = 1000
max_key_rate = 100

[traffic]
