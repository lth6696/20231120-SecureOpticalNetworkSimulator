load = 20
mean_holding_time = 10.0
seed = 42
max_bandwidth = 1000
min_bandwidth = 1
max_key_rate = 100
min_key_rate = 1
max_security_level = 2
min_security_level = 0

[[traffic.call_types]]
rate = 10
weight = 5

[[traffic.call_types]]
rate = 100
weight = 4

[[traffic.call_types]]
rate = 1000
weight = 1

[algorithm]
name = "JDRG"
k = 4

[costs]
channel = 2.0
port = 3.0
